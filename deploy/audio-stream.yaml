# audio-stream: single librespot|ffmpeg pod exposing MP3 over HTTP on a MetalLB
# LoadBalancer IP. One replica (librespot is one device), Recreate strategy (a
# single live stream — a rolling second pod would fight for the same Connect
# device name and split the audio).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-stream
  namespace: gopher-spot
  labels:
    app: audio-stream
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: audio-stream
  template:
    metadata:
      labels:
        app: audio-stream
    spec:
      # Pull creds for the private ghcr packages. Harmless if you make the
      # packages public instead (a missing pull Secret is just a warning; the
      # anonymous pull still succeeds). Create with:
      #   kubectl -n gopher-spot create secret docker-registry ghcr-pull \
      #     --docker-server=ghcr.io --docker-username=felipedbene \
      #     --docker-password=<PAT with read:packages>
      imagePullSecrets:
        - name: ghcr-pull
      # No hostNetwork, no nodeSelector — scheduler decides (PROMPT constraint).
      # The image is multi-arch, so it runs on amd64 or arm64 nodes alike.
      #
      # ndots:1 — resolve external FQDNs (apresolve/ap.spotify.com) as absolute
      # names FIRST, never through the search path. kubelet leaks the node's
      # `search debene.dev …` into pods, and the public debene.dev zone answers
      # NOERROR/empty (not NXDOMAIN) for bogus subdomains, which musl's
      # getaddrinfo treats as a final "no such host" — so on nodes with that
      # search list, librespot couldn't resolve Spotify at all ("could not
      # initialize spirc: Service unavailable"). Nothing here uses short
      # cluster-internal names, so the search path isn't needed.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: audio-stream
          image: ghcr.io/felipedbene/gopher-spot-audio:latest
          imagePullPolicy: Always
          env:
            # credentials mode: zeroconf can't cross an overlay pod without
            # hostNetwork (forbidden), so librespot logs into Spotify's AP with a
            # cached credentials.json and appears as a Connect device via
            # Spotify's backend (outbound HTTPS only). The credentials.json comes
            # from the `librespot-credentials` Secret, mounted read-only at /seed
            # and copied into the writable /cache emptyDir by the entrypoint.
            - name: LIBRESPOT_MODE
              value: "credentials"
            - name: LIBRESPOT_NAME
              value: "gopher-spot"
          ports:
            - name: http-mp3
              containerPort: 8000
          # Icecast is a persistent multi-client server, so a TCP probe on :8000
          # is safe now (the old `-listen 1` design had none, because a probe
          # would have stolen its single stream slot).
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            # Writable cache (Q3: emptyDir, not PVC — a PVC would be RWO and pin
            # the pod to a node, fighting "scheduler decides"). librespot rewrites
            # credentials.json here; on restart the entrypoint re-seeds from /seed.
            - name: cache
              mountPath: /cache
            # The player credentials.json, read-only, seeded once from a local
            # zeroconf login. Distinct from the Web API OAuth (Fio C).
            - name: credentials-seed
              mountPath: /seed
              readOnly: true
      volumes:
        - name: cache
          emptyDir: {}
        - name: credentials-seed
          secret:
            secretName: librespot-credentials
            items:
              - key: credentials.json
                path: credentials.json
---
apiVersion: v1
kind: Service
metadata:
  name: audio-stream
  namespace: gopher-spot
  labels:
    app: audio-stream
spec:
  type: LoadBalancer
  ports:
    - port: 8000
      targetPort: 8000
      name: http-mp3
  selector:
    app: audio-stream
