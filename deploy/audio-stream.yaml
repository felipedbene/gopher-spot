# audio-stream: single librespot|ffmpeg pod exposing MP3 over HTTP on a MetalLB
# LoadBalancer IP. One replica (librespot is one device), Recreate strategy (a
# single live stream — a rolling second pod would fight for the same Connect
# device name and split the audio).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-stream
  namespace: gopher-spot
  labels:
    app: audio-stream
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: audio-stream
  template:
    metadata:
      labels:
        app: audio-stream
    spec:
      # No hostNetwork, no nodeSelector — scheduler decides (PROMPT constraint).
      # The image is multi-arch, so it runs on amd64 or arm64 nodes alike.
      containers:
        - name: audio-stream
          image: ghcr.io/felipedbene/gopher-spot-audio:latest
          imagePullPolicy: Always
          env:
            # credentials mode: zeroconf can't cross an overlay pod without
            # hostNetwork (forbidden), so librespot logs into Spotify's AP with a
            # cached credentials.json and appears as a Connect device via
            # Spotify's backend (outbound HTTPS only). The credentials.json comes
            # from the `librespot-credentials` Secret, mounted read-only at /seed
            # and copied into the writable /cache emptyDir by the entrypoint.
            - name: LIBRESPOT_MODE
              value: "credentials"
            - name: LIBRESPOT_NAME
              value: "gopher-spot"
          ports:
            - name: http-mp3
              containerPort: 8000
          # NO readiness/liveness probe on :8000 — ffmpeg's `-listen 1` HTTP
          # server accepts exactly ONE client, so a TCP/HTTP probe would consume
          # the single stream slot and starve the real listener. Health is
          # observed out-of-band (does VLC hear audio).
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            # Writable cache (Q3: emptyDir, not PVC — a PVC would be RWO and pin
            # the pod to a node, fighting "scheduler decides"). librespot rewrites
            # credentials.json here; on restart the entrypoint re-seeds from /seed.
            - name: cache
              mountPath: /cache
            # The player credentials.json, read-only, seeded once from a local
            # zeroconf login. Distinct from the Web API OAuth (Fio C).
            - name: credentials-seed
              mountPath: /seed
              readOnly: true
      volumes:
        - name: cache
          emptyDir: {}
        - name: credentials-seed
          secret:
            secretName: librespot-credentials
            items:
              - key: credentials.json
                path: credentials.json
---
apiVersion: v1
kind: Service
metadata:
  name: audio-stream
  namespace: gopher-spot
  labels:
    app: audio-stream
spec:
  type: LoadBalancer
  ports:
    - port: 8000
      targetPort: 8000
      name: http-mp3
  selector:
    app: audio-stream
