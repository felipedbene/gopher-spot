# gopher-server: geomyidae + the gopher-spot dcgi on :70 behind a MetalLB
# LoadBalancer. Stateless (replicas 2, RollingUpdate) — the dcgi holds no state,
# and Fio C's Web API caches are per-process (fine to duplicate across replicas).
apiVersion: v1
kind: ConfigMap
metadata:
  name: gopher-server-config
  namespace: gopher-spot
data:
  # The audio-stream LoadBalancer, as the OS 9 box will dial it. Must be a
  # LAN-reachable IP, NOT a cluster DNS name. Fill in after the audio-stream
  # Service gets its MetalLB IP (pool is 10.0.100.x, not the 10.0.10.x the PROMPT
  # guessed).
  AUDIO_STREAM_URL: "http://10.0.100.113:8000/spotify.mp3"
  # The gopher-server LB IP (or gopher-spot.lan): geomyidae stamps it into every
  # link's host token so the OS 9 gopher client follows links back to the right
  # address.
  # Assigned by MetalLB on first apply.
  GOPHER_HOST: "10.0.100.112"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gopher-server
  namespace: gopher-spot
  labels:
    app: gopher-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gopher-server
  template:
    metadata:
      labels:
        app: gopher-server
    spec:
      # Pull creds for the private ghcr packages (see audio-stream.yaml). Harmless
      # if you make the packages public instead.
      imagePullSecrets:
        - name: ghcr-pull
      # No hostNetwork, no nodeSelector — scheduler decides. Multi-arch image.
      # fsGroup so nobody (65534) can write the cache emptyDir below.
      securityContext:
        fsGroup: 65534
      containers:
        - name: gopher-server
          image: ghcr.io/felipedbene/gopher-spot-server:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: gopher-server-config
            # Web API OAuth creds. optional: the pod still starts without the
            # Secret and the dcgi serves the offline mock menus (graceful).
            - secretRef:
                name: spotify-oauth
                optional: true
          env:
            # Writable dir for the disk cache (access token, search 5min, devices
            # 30s). A per-request dcgi can't hold an in-process cache.
            - name: SPOT_STATE_DIR
              value: /var/cache/spot
          ports:
            - name: gopher
              containerPort: 70
          securityContext:
            # geomyidae binds :70 as nobody via the file capability baked into
            # the binary; NET_BIND_SERVICE must stay in the bounding set for that
            # to raise. runAsNonRoot keeps it unprivileged otherwise.
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          readinessProbe:
            tcpSocket:
              port: 70
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 70
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: cache
              mountPath: /var/cache/spot
      volumes:
        # Per-replica disk cache for the token + Web API results. emptyDir: it's
        # a warm cache, nothing to persist across restarts.
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gopher-server
  namespace: gopher-spot
  labels:
    app: gopher-server
spec:
  type: LoadBalancer
  # fio 429 / R2: pin each client IP to one replica. The /now micro-cache (and
  # its command-time invalidation, and the 429 cooldown) are per-replica files;
  # round-robin sent a 2s poller alternately to both replicas, so the ~3s cache
  # was never warm for it and every poll cost real Spotify calls. With affinity
  # a client's cache, busts, and cooldown all land on the same replica.
  sessionAffinity: ClientIP
  ports:
    - port: 70
      targetPort: 70
      name: gopher
  selector:
    app: gopher-server
